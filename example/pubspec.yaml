name: canon_example
description: Minimal example of the canon navigation package.
publish_to: none
version: 0.0.1

environment:
  sdk: ^3.12.0

dependencies:
  canon: ^0.6.0
  flutter:
    sdk: flutter
dev_dependencies:
  build_runner: ^2.15.0
  canon_generator: ^0.7.0
  flutter_test:
    sdk: flutter

# Build against the in-repo canon/canon_generator; analyzer ^13 is forced for
# the codegen toolchain (canon_generator + dart_style need it).
dependency_overrides:
  canon:
    path: ../
  canon_generator:
    path: ../../canon_generator
  analyzer: ^13.0.0
  dart_style: ^3.1.9
